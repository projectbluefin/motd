name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v0.3.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-go@0aaccfd150d50ccaeb58ebd88d36e91967a5f35b # v5.4.0
        with:
          go-version-file: go.mod

      - name: Build and release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.tag }}
        run: |
          VERSION="${TAG#v}"
          GOOS=linux GOARCH=amd64 go build -ldflags="-s -w" -o "umotd_${VERSION}_linux_amd64" .
          GOOS=linux GOARCH=arm64 go build -ldflags="-s -w" -o "umotd_${VERSION}_linux_arm64" .
          sha256sum "umotd_${VERSION}_linux_amd64" "umotd_${VERSION}_linux_arm64" > checksums.txt
          gh release create "${TAG}" \
            --title "${TAG}" \
            --generate-notes \
            "umotd_${VERSION}_linux_amd64" \
            "umotd_${VERSION}_linux_arm64" \
            checksums.txt
